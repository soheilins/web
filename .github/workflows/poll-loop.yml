name: Polling PDF Generator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours

    steps:
      - uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('.github/workflows/poll-loop.yml') }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk-bridge2.0-0 libdrm2 \
            libxkbcommon0 libxdamage1 libxrandr2 libgbm1 \
            libasound2t64 libpangocairo-1.0-0 libxcomposite1 \
            libxfixes3 libcups2 libatk1.0-0 libpango-1.0-0 \
            libx11-xcb1 libxcb-dri3-0 libxcb1 libxext6 libx11-6 \
            libxcb-util1 libgtk-3-0 libgdk-pixbuf2.0-0 \
            libxshmfence1 libxtst6 libxss1

      - name: Install Python packages
        run: pip install playwright requests

      - name: Install Chromium
        run: playwright install chromium

      - name: Poll queue, generate PDFs, send to Rubika
        shell: python
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          import os, time, subprocess, sys, requests, json

          BOT_TOKEN = os.environ["BOT_TOKEN"]
          BASE_API = f"https://botapi.rubika.ir/v3/{BOT_TOKEN}"
          REQUEST_SEND_FILE_URL = f"{BASE_API}/requestSendFile"
          SEND_FILE_URL = f"{BASE_API}/sendFile"

          QUEUE = "queue.txt"
          CHAT_ID_FILE = "chat_id.txt"
          BRANCH = "${{ github.ref_name }}"

          def get_chat_id():
              try:
                  with open(CHAT_ID_FILE) as f:
                      return f.read().strip()
              except:
                  return None

          def upload_and_send_file(chat_id, file_path):
              """Upload file to Rubika (3 steps) and send to chat."""
              # Step 1: request upload URL
              resp = requests.post(REQUEST_SEND_FILE_URL, json={"type": "File"})
              if resp.status_code != 200:
                  print(f"requestSendFile error: {resp.status_code} {resp.text}")
                  return False
              upload_url = resp.json()["data"]["upload_url"]

              # Step 2: upload the actual file
              with open(file_path, 'rb') as f:
                  upload_resp = requests.post(upload_url, files={"file": f})
              if upload_resp.status_code != 200:
                  print(f"File upload error: {upload_resp.status_code} {upload_resp.text}")
                  return False
              file_id = upload_resp.json()["data"]["file_id"]

              # Step 3: send to chat
              send_data = {
                  "chat_id": chat_id,
                  "file_id": file_id,
                  "text": "📄 PDF generated"
              }
              send_resp = requests.post(SEND_FILE_URL, json=send_data)
              if send_resp.status_code == 200:
                  print(f"File sent to Rubika (msg_id: {send_resp.json()['data']['message_id']})")
                  return True
              else:
                  print(f"sendFile error: {send_resp.status_code} {send_resp.text}")
                  return False

          while True:
              subprocess.run(["git", "pull", "origin", BRANCH])

              if not os.path.exists(QUEUE):
                  time.sleep(5)
                  continue

              with open(QUEUE) as f:
                  lines = [l.strip() for l in f if l.strip()]

              if not lines:
                  time.sleep(5)
                  continue

              if "0" in lines:
                  open(QUEUE, 'w').close()
                  subprocess.run(["git", "add", QUEUE])
                  subprocess.run(["git", "commit", "-m", "Stop"])
                  subprocess.run(["git", "push"])
                  break

              for url in lines:
                  if url == "0" or not url.startswith(("http://", "https://")):
                      continue

                  res = subprocess.run(
                      [sys.executable, "generate_pdf.py", url, "pdfs"],
                      capture_output=True, text=True
                  )
                  if res.returncode != 0:
                      continue

                  pdf_path = res.stdout.strip().split("PDF generated: ")[-1]

                  # Commit PDF
                  subprocess.run(["git", "add", pdf_path])
                  subprocess.run(["git", "commit", "-m", f"Add PDF for {url}"])

                  # Send to Rubika
                  chat_id = get_chat_id()
                  if chat_id:
                      upload_and_send_file(chat_id, pdf_path)
                  else:
                      print("No chat_id – skipping Rubika send")

              # Clear queue
              open(QUEUE, 'w').close()
              subprocess.run(["git", "add", QUEUE])
              subprocess.run(["git", "commit", "-m", "Process queue"])
              subprocess.run(["git", "push"])

              time.sleep(5)

      - name: Final push (safety)
        if: always()
        run: |
          git add pdfs/ queue.txt || true
          git commit -m "Final commit" || true
          git push || true
