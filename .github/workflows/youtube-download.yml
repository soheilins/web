name: YouTube Download (Commit Only)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
      quality:
        description: 'Desired quality (e.g. 720p, best)'
        required: true
        default: '720p'
      chat_id:
        description: 'Rubika chat ID (forwarded to link sender)'
        required: true

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write                   # needed to dispatch event to second workflow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp & FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install --upgrade yt-dlp

      - name: Connect to Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: client
          stack: ipv4

      - name: Download video with selected quality (auto fallback)
        id: download
        run: |
          mkdir -p downloads
          QUALITY="${{ github.event.inputs.quality }}"
          URL="${{ github.event.inputs.video_url }}"

          if [ "$QUALITY" = "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          else
            HEIGHT=$(echo "$QUALITY" | sed 's/p//')
            FORMAT="bestvideo[height<=${HEIGHT}]+bestaudio/best[height<=${HEIGHT}]/best"
          fi

          echo "Trying format: $FORMAT with web_safari client"
          if yt-dlp -f "$FORMAT" \
               -o "downloads/video.%(ext)s" \
               --merge-output-format mp4 \
               --no-playlist \
               --extractor-args "youtube:player_client=web_safari;formats=missing_pot" \
               "$URL"; then
            echo "Downloaded with requested quality (web_safari)."
          elif yt-dlp -f "$FORMAT" \
               -o "downloads/video.%(ext)s" \
               --merge-output-format mp4 \
               --no-playlist \
               --extractor-args "youtube:player_client=ios;formats=missing_pot" \
               "$URL"; then
            echo "Downloaded with requested quality (ios client)."
          elif yt-dlp -f "$FORMAT" \
               -o "downloads/video.%(ext)s" \
               --merge-output-format mp4 \
               --no-playlist \
               --extractor-args "youtube:player_client=tv;formats=missing_pot" \
               "$URL"; then
            echo "Downloaded with requested quality (tv client)."
          else
            echo "Falling back to best available."
            yt-dlp -f "bestvideo+bestaudio/best" \
                   -o "downloads/video.%(ext)s" \
                   --merge-output-format mp4 \
                   --no-playlist \
                   --extractor-args "youtube:formats=missing_pot" \
                   "$URL" || { echo "Download completely failed."; exit 1; }
          fi

          # Rename to timestamp YYMMDDHHmmss.mp4
          TIMESTAMP=$(date +'%y%m%d%H%M%S')
          mv downloads/video.mp4 "downloads/${TIMESTAMP}.mp4"
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "Downloaded: $(du -h downloads/${TIMESTAMP}.mp4 | cut -f1)"

      - name: Commit video to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "downloads/${{ steps.download.outputs.timestamp }}.mp4"
          git commit -m "Add YouTube video (${{ github.event.inputs.quality }}) ${{ steps.download.outputs.timestamp }}" || echo "No changes"
          git pull --rebase origin main
          git push

      - name: Trigger link‑sender workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"send-youtube-link","client_payload":{"chat_id":"${{ github.event.inputs.chat_id }}","file":"downloads/${{ steps.download.outputs.timestamp }}.mp4"}}'
