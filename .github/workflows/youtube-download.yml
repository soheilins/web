name: YouTube Download (User‑Selected Quality)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
      quality:
        description: 'Desired quality (e.g. 720p, best)'
        required: true
        default: '720p'
      chat_id:
        description: 'Rubika chat ID to send the result to'
        required: true

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp, FFmpeg, and PO‑token tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install --upgrade yt-dlp
          pip install -U bgutil-ytdlp-pot-provider

      - name: Start PO‑token provider (server)
        run: |
          # Run the provider in the background on port 4416
          bgutil-ytdlp-pot-provider server --port 4416 &
          # Give it a moment to start
          sleep 3
          # Health check
          curl -s http://127.0.0.1:4416/health || echo "Provider may still be starting…"

      - name: Download video with selected quality
        id: download
        run: |
          mkdir -p downloads
          QUALITY="${{ github.event.inputs.quality }}"
          URL="${{ github.event.inputs.video_url }}"

          if [ "$QUALITY" = "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          else
            HEIGHT=$(echo "$QUALITY" | sed 's/p//')
            FORMAT="bestvideo[height<=${HEIGHT}]+bestaudio/best[height<=${HEIGHT}]/best"
          fi

          yt-dlp -f "$FORMAT" \
            -o "downloads/video.%(ext)s" \
            --merge-output-format mp4 \
            --no-playlist \
            --extractor-args "youtube:pot_provider=http://127.0.0.1:4416" \
            "$URL"

          SIZE=$(stat -c%s downloads/video.mp4)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Downloaded: $(du -h downloads/video.mp4 | cut -f1)"

      - name: Stop PO‑token provider
        if: always()
        run: pkill -f bgutil-ytdlp-pot-provider || true

      - name: Commit video to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/video.mp4
          git commit -m "Add YouTube video (${{ github.event.inputs.quality }}) from ${{ github.event.inputs.video_url }}" || echo "No changes"
          git pull --rebase origin main
          git push

      - name: Trigger Rubika delivery workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"rubika-send","client_payload":{"chat_id":"${{ github.event.inputs.chat_id }}","file":"downloads/video.mp4","size":"${{ steps.download.outputs.size }}"}}'
