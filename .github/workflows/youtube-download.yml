name: YouTube Download (Link Only)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
      quality:
        description: 'Desired quality (e.g. 720p, best)'
        required: true
        default: '720p'
      chat_id:
        description: 'Rubika chat ID to send the result to'
        required: true

jobs:
  download-and-link:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp & FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install --upgrade yt-dlp

      - name: Connect to Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: client
          stack: ipv4

      - name: Download video with selected quality (auto fallback)
        id: download
        run: |
          mkdir -p downloads
          QUALITY="${{ github.event.inputs.quality }}"
          URL="${{ github.event.inputs.video_url }}"

          if [ "$QUALITY" = "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          else
            HEIGHT=$(echo "$QUALITY" | sed 's/p//')
            FORMAT="bestvideo[height<=${HEIGHT}]+bestaudio/best[height<=${HEIGHT}]/best"
          fi

          echo "Trying format: $FORMAT with web_safari client"
          if yt-dlp -f "$FORMAT" \
               -o "downloads/video.%(ext)s" \
               --merge-output-format mp4 \
               --no-playlist \
               --extractor-args "youtube:player_client=web_safari;formats=missing_pot" \
               "$URL"; then
            echo "Downloaded with requested quality (web_safari)."
          elif yt-dlp -f "$FORMAT" \
               -o "downloads/video.%(ext)s" \
               --merge-output-format mp4 \
               --no-playlist \
               --extractor-args "youtube:player_client=ios;formats=missing_pot" \
               "$URL"; then
            echo "Downloaded with requested quality (ios client)."
          elif yt-dlp -f "$FORMAT" \
               -o "downloads/video.%(ext)s" \
               --merge-output-format mp4 \
               --no-playlist \
               --extractor-args "youtube:player_client=tv;formats=missing_pot" \
               "$URL"; then
            echo "Downloaded with requested quality (tv client)."
          else
            echo "Falling back to best available."
            yt-dlp -f "bestvideo+bestaudio/best" \
                   -o "downloads/video.%(ext)s" \
                   --merge-output-format mp4 \
                   --no-playlist \
                   --extractor-args "youtube:formats=missing_pot" \
                   "$URL" || { echo "Download completely failed."; exit 1; }
          fi

          SIZE=$(stat -c%s downloads/video.mp4)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Downloaded: $(du -h downloads/video.mp4 | cut -f1)"

      - name: Commit video to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/video.mp4
          git commit -m "Add YouTube video (${{ github.event.inputs.quality }}) from ${{ github.event.inputs.video_url }}" || echo "No changes"
          git pull --rebase origin main
          git push

      - name: Send download link via Rubika
        env:
          RUBIKA_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          SIZE: ${{ steps.download.outputs.size }}
        run: |
          SIZE=${{ steps.download.outputs.size }}
          MAX_SIZE=$((100 * 1024 * 1024))  # 100 MB

          if [ -z "$RUBIKA_BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Rubika secrets missing – skipping notification."
            exit 0
          fi

          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            MESSAGE="❌ Video too large (>100 MB). Not saved."
          else
            RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/downloads/video.mp4"
            MESSAGE="📹 YouTube video downloaded.\n🔗 Download: ${RAW_URL}"
          fi

          curl -s -X POST "https://botapi.rubika.ir/v3/${RUBIKA_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"${MESSAGE}\"}"
