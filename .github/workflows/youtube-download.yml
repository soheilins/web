name: YouTube Download (User‑Selected Quality)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
      quality:
        description: 'Desired quality (e.g. 720p, best)'
        required: true
        default: '720p'
      chat_id:
        description: 'Rubika chat ID to send the result to'
        required: true

jobs:
  download-and-deliver:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yt-dlp & FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg
          pip install --upgrade yt-dlp

      - name: Connect to Cloudflare WARP
        uses: viperadnan-git/setup-warp@v1
        with:
          mode: client
          stack: ipv4

      - name: Download video with selected quality (auto fallback)
        id: download
        run: |
          mkdir -p downloads
          QUALITY="${{ github.event.inputs.quality }}"
          URL="${{ github.event.inputs.video_url }}"

          # Build format string
          if [ "$QUALITY" = "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          else
            HEIGHT=$(echo "$QUALITY" | sed 's/p//')
            FORMAT="bestvideo[height<=${HEIGHT}]+bestaudio/best[height<=${HEIGHT}]/best"
          fi

          # First attempt – web_safari client (no PO token needed)
          echo "Trying format: $FORMAT with web_safari client"
          if yt-dlp -f "$FORMAT" \
               -o "downloads/video.%(ext)s" \
               --merge-output-format mp4 \
               --no-playlist \
               --extractor-args "youtube:player_client=web_safari;formats=missing_pot" \
               "$URL"; then
            echo "Downloaded with requested quality (web_safari)."
          elif yt-dlp -f "$FORMAT" \
               -o "downloads/video.%(ext)s" \
               --merge-output-format mp4 \
               --no-playlist \
               --extractor-args "youtube:player_client=ios;formats=missing_pot" \
               "$URL"; then
            echo "Downloaded with requested quality (ios client)."
          elif yt-dlp -f "$FORMAT" \
               -o "downloads/video.%(ext)s" \
               --merge-output-format mp4 \
               --no-playlist \
               --extractor-args "youtube:player_client=tv;formats=missing_pot" \
               "$URL"; then
            echo "Downloaded with requested quality (tv client)."
          else
            echo "Requested quality failed – falling back to best available."
            yt-dlp -f "bestvideo+bestaudio/best" \
                   -o "downloads/video.%(ext)s" \
                   --merge-output-format mp4 \
                   --no-playlist \
                   --extractor-args "youtube:formats=missing_pot" \
                   "$URL" || {
                     echo "Download completely failed."
                     exit 1
                   }
          fi

          SIZE=$(stat -c%s downloads/video.mp4)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "Downloaded: $(du -h downloads/video.mp4 | cut -f1)"

      - name: Commit video to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/video.mp4
          git commit -m "Add YouTube video (${{ github.event.inputs.quality }}) from ${{ github.event.inputs.video_url }}" || echo "No changes"
          git pull --rebase origin main
          git push

      - name: Deliver video based on size
        env:
          RUBIKA_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          SIZE: ${{ steps.download.outputs.size }}
        run: |
          FILE_PATH="downloads/video.mp4"
          SIZE=${{ steps.download.outputs.size }}
          SMALL_MAX=$((50 * 1024 * 1024))
          MEDIUM_MAX=$((100 * 1024 * 1024))

          if [ -z "$RUBIKA_BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "Rubika secrets missing – skipping delivery."
            exit 0
          fi

          send_rubika_message() {
            curl -s -X POST "https://botapi.rubika.ir/v3/${RUBIKA_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"text\":\"$1\"}"
          }

          if [ "$SIZE" -le "$SMALL_MAX" ]; then
            BASE="https://botapi.rubika.ir/v3/$RUBIKA_BOT_TOKEN"

            UPLOAD_RESP=$(curl -s -X POST "$BASE/requestSendFile" -H "Content-Type: application/json" -d '{"type":"Video"}')
            UPLOAD_URL=$(echo "$UPLOAD_RESP" | jq -r '.data.upload_url // empty')
            if [ -z "$UPLOAD_URL" ]; then
              RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/downloads/video.mp4"
              send_rubika_message "📹 YouTube video downloaded.\n⚠️ Rubika upload failed. GitHub link: ${RAW_URL}"
              exit 0
            fi

            UPLOAD_FILE_RESP=$(curl -s -w "\n%{http_code}" -X POST "$UPLOAD_URL" -F "file=@${FILE_PATH}")
            HTTP_CODE=$(echo "$UPLOAD_FILE_RESP" | tail -n1)
            BODY=$(echo "$UPLOAD_FILE_RESP" | sed '$d')
            FILE_ID=$(echo "$BODY" | jq -r '.data.file_id // empty')
            if [ -z "$FILE_ID" ]; then
              RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/downloads/video.mp4"
              send_rubika_message "📹 YouTube video downloaded.\n⚠️ Rubika upload failed. GitHub link: ${RAW_URL}"
              exit 0
            fi

            SEND_RESP=$(curl -s -X POST "$BASE/sendFile" -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"${CHAT_ID}\",\"file_id\":\"${FILE_ID}\",\"text\":\"📹 YouTube video\"}")
            MESSAGE_ID=$(echo "$SEND_RESP" | jq -r '.data.message_id // empty')
            if [ -n "$MESSAGE_ID" ]; then
              echo "Video sent to Rubika."
            else
              RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/downloads/video.mp4"
              send_rubika_message "📹 YouTube video downloaded.\n⚠️ Rubika send failed. GitHub link: ${RAW_URL}"
            fi

          elif [ "$SIZE" -le "$MEDIUM_MAX" ]; then
            RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/downloads/video.mp4"
            send_rubika_message "📹 YouTube video downloaded (50–100 MB).\n🔗 Download: ${RAW_URL}"
          else
            rm -f downloads/video.mp4
            send_rubika_message "❌ Video too large (>100 MB). Not saved."
          fi
