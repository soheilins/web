name: Polling PDF Generator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('.github/workflows/poll-loop.yml') }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk-bridge2.0-0 libdrm2 \
            libxkbcommon0 libxdamage1 libxrandr2 libgbm1 \
            libasound2t64 libpangocairo-1.0-0 libxcomposite1 \
            libxfixes3 libcups2 libatk1.0-0 libpango-1.0-0 \
            libx11-xcb1 libxcb-dri3-0 libxcb1 libxext6 libx11-6 \
            libxcb-util1 libgtk-3-0 libgdk-pixbuf2.0-0 \
            libxshmfence1 libxtst6 libxss1

      - name: Install Python packages
        run: pip install playwright requests

      - name: Install Chromium
        run: playwright install chromium

      - name: Poll queue, generate PDFs, send to Rubika
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}   # توکن ربات روبیکا
        run: |
          import os, time, subprocess, sys, requests

          BOT_TOKEN = os.environ["BOT_TOKEN"]
          QUEUE = "queue.txt"
          CHAT_ID_FILE = "chat_id.txt"
          SEND_FILE_URL = f"https://botapi.rubika.ir/v3/{BOT_TOKEN}/sendFile"
          BRANCH = "${{ github.ref_name }}"

          def get_chat_id():
              try:
                  with open(CHAT_ID_FILE) as f:
                      return f.read().strip()
              except:
                  return None

          while True:
              subprocess.run(["git", "pull", "origin", BRANCH])

              if not os.path.exists(QUEUE):
                  time.sleep(5)
                  continue

              with open(QUEUE) as f:
                  lines = [l.strip() for l in f if l.strip()]

              if not lines:
                  time.sleep(5)
                  continue

              if "0" in lines:
                  open(QUEUE, 'w').close()
                  subprocess.run(["git", "add", QUEUE])
                  subprocess.run(["git", "commit", "-m", "Stop"])
                  subprocess.run(["git", "push"])
                  break

              for url in lines:
                  if url == "0" or not url.startswith(("http://", "https://")):
                      continue

                  # تولید PDF
                  res = subprocess.run(
                      [sys.executable, "generate_pdf.py", url, "pdfs"],
                      capture_output=True, text=True
                  )
                  if res.returncode != 0:
                      continue

                  pdf_path = res.stdout.strip().split("PDF generated: ")[-1]

                  # ارسال به مخزن
                  subprocess.run(["git", "add", pdf_path])
                  subprocess.run(["git", "commit", "-m", f"Add PDF for {url}"])

                  # ارسال به روبیکا
                  chat_id = get_chat_id()
                  if chat_id:
                      try:
                          with open(pdf_path, 'rb') as f:
                              files = {'file': (os.path.basename(pdf_path), f, 'application/pdf')}
                              data = {'chat_id': chat_id}
                              requests.post(SEND_FILE_URL, files=files, data=data)
                      except Exception as e:
                          print(f"Send failed: {e}")

              # پاک کردن صف
              open(QUEUE, 'w').close()
              subprocess.run(["git", "add", QUEUE])
              subprocess.run(["git", "commit", "-m", "Process queue"])
              subprocess.run(["git", "push"])

              time.sleep(5)

      - name: Final push
        if: always()
        run: |
          git add pdfs/ queue.txt || true
          git commit -m "Final commit" || true
          git push || true
